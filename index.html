            uz: { loading: "Yuklanmoqda...", my_orders: "Buyurtmalarim", address: "Farg‘ona shahar, Burxoniddin Marg‘iloniy ko‘chasi, 60", search_placeholder: "Qidiruv...", items: "taom", currency: "so'm", cart_title: "Korzina", total: "Jami:", ph_name: "Ismingiz", ph_address: "Manzil", pickup: "Olib ketish", delivery: "Yetkazib berish (+10 000)", checkout_btn: "Buyurtma berish", add_to_cart: "Savatchaga qo'shish", all_dishes: "Barcha taomlar", status_pending: "Kutilmoqda", status_accepted: "Qabul qilindi", status_in_progress: "Tayyorlanmoqda", status_ready_delivery: "Yo'lda / Tayyor", status_completed: "Yakunlandi", status_rejected: "Rad etildi", wait_5m: "Iltimos, keyingi buyurtma uchun biroz kuting.", success: "Buyurtma muvaffaqiyatli yuborildi!", error: "Xatolik yuz berdi.", empty_orders: "Sizda hali buyurtmalar yo'q." },
            ru: { loading: "Загрузка...", my_orders: "Мои заказы", address: "г. Фергана, ул. Б. Маргилани, 60", search_placeholder: "Поиск...", items: "шт.", currency: "сум", cart_title: "Корзина", total: "Итого:", ph_name: "Ваше имя", ph_address: "Адрес доставки", pickup: "Самовывоз", delivery: "Доставка (+10 000)", checkout_btn: "Оформить заказ", add_to_cart: "В корзину", all_dishes: "Все блюда", status_pending: "Ожидает", status_accepted: "Принят", status_in_progress: "Готовится", status_ready_delivery: "В пути / Готов", status_completed: "Завершен", status_rejected: "Отменен", wait_5m: "Подождите перед следующим заказом.", success: "Заказ успешно отправлен!", error: "Ошибка при отправке.", empty_orders: "У вас пока нет заказов." },
            en: { loading: "Loading...", my_orders: "My Orders", address: "Fergana city, B. Margilaniy str., 60", search_placeholder: "Search...", items: "items", currency: "uzs", cart_title: "Cart", total: "Total:", ph_name: "Your Name", ph_address: "Delivery Address", pickup: "Pickup", delivery: "Delivery (+10 000)", checkout_btn: "Checkout", add_to_cart: "Add to cart", all_dishes: "All Dishes", status_pending: "Pending", status_accepted: "Accepted", status_in_progress: "Preparing", status_ready_delivery: "On the way", status_completed: "Completed", status_rejected: "Rejected", wait_5m: "Please wait before ordering again.", success: "Order successfully placed!", error: "An error occurred.", empty_orders: "No orders found." }
        };

        const cats_map = {
            "cat5": { uz: "Kofe va Choy", ru: "Кофе и Чай", en: "Coffee & Tea" }, "cat14": { uz: "Choy", ru: "Чай", en: "Tea" }, "cat13": { uz: "Kofe", ru: "Кофе", en: "Coffee" }, "cat15": { uz: "Kokteyl", ru: "Коктейли", en: "Cocktails" }, "cat16": { uz: "Birinchi taom", ru: "Первые блюда", en: "First Courses" }, "cat7": { uz: "Sho'rvalar", ru: "Супы", en: "Soups" }, "cat11": { uz: "Fast-food", ru: "Фаст-фуд", en: "Fast Food" }, "cat9": { uz: "Qo'shimcha taom", ru: "Гарниры", en: "Side Dishes" }, "cat8": { uz: "Kombo", ru: "Комбо", en: "Combo" }, "cat6": { uz: "Go'shtli taomlar", ru: "Мясные блюда", en: "Meat Dishes" }, "cat10": { uz: "Pitsalar", ru: "Пиццы", en: "Pizzas" }, "cat12": { uz: "Vaflilar", ru: "Вафли", en: "Waffles" }, "cat17": { uz: "Desert", ru: "Десерты", en: "Desserts" }, "cat18": { uz: "Muzqaymoq", ru: "Мороженое", en: "Ice Cream" }
        };

           let dishes = []; 
        let currentLang = localStorage.getItem('lang') || 'uz';
        let cart = JSON.parse(localStorage.getItem('cart_yuma')) || {};
        let activeCategory = 'all';

        const menuContainer = document.getElementById('menuContainer');
        const menuLoading = document.getElementById('menuLoading');
        const floatingCart = document.getElementById('floatingCart');
        const cartCount = document.getElementById('cartCount');
        const cartTotal = document.getElementById('cartTotal');
        const cartModal = document.getElementById('cartModal');
        const cartItemsContainer = document.getElementById('cartItemsContainer');
        const cartFinalTotal = document.getElementById('cartFinalTotal');
        const searchInput = document.getElementById('searchInput');
        const submitOrderBtn = document.getElementById('submitOrderBtn');

            const langModal = document.getElementById('langModal');
        const openLangModalBtn = document.getElementById('openLangModalBtn');
        const closeLangBtn = document.getElementById('closeLangBtn');
        const currentLangLabel = document.getElementById('currentLangLabel');

        openLangModalBtn.addEventListener('click', () => {
            langModal.style.display = 'flex';
        });
        closeLangBtn.addEventListener('click', () => {
            langModal.style.display = 'none';
        });
        window.selectLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('lang', currentLang);
            langModal.style.display = 'none';
            updateUI();
        };

          function loadDishesFromFirebase() {
               const menuRef = ref(db, 'menu'); 
            onValue(menuRef, (snapshot) => {
                const data = snapshot.val();
                dishes = [];
                if (data) {
                     Object.keys(data).forEach(key => {
                        const d = data[key];
                        if(d) {
                            dishes.push({
                                id: key,
                                c: d.category || d.c || '', 
                                p: Number(d.price || d.p || 0), 
                                i: d.image || d.i || '', 
                                t: { 
                                    uz: d.name_uz || (d.t && d.t.uz) || '', 
                                    ru: d.name_ru || (d.t && d.t.ru) || '', 
                                    en: d.name_en || (d.t && d.t.en) || '' 
                                }
                            });
                        }
                    });
                }
                
                // Переключение экранов загрузки
                menuLoading.classList.add('hidden');
                menuContainer.classList.remove('hidden');
                
                updateUI();
            }, (error) => {
                console.error("Firebase load error:", error);
                showToast("Firebase: " + error.message, "error");
            });
        }

        function updateUI() {
            currentLangLabel.innerText = currentLang.toUpperCase();
            document.querySelectorAll('.loc').forEach(el => {
                const key = el.getAttribute('data-key');
                if(uiLocales[currentLang][key]) el.innerText = uiLocales[currentLang][key];
            });
            document.querySelectorAll('.loc-placeholder').forEach(el => {
                const key = el.getAttribute('data-key');
                if(uiLocales[currentLang][key]) el.placeholder = uiLocales[currentLang][key];
            });
            renderTabs();
            renderMenu();
            updateCartFloatingButton();
        }

        function renderTabs() {
            const container = document.getElementById('categoryTabsContainer');
            let tabsHtml = `<button class="tab-btn px-5 py-2.5 rounded-xl font-bold text-sm shrink-0 ${activeCategory==='all'?'active':''}" id="tab-all">${uiLocales[currentLang].all_dishes}</button>`;
            
            const uniqueCats = [...new Set(dishes.map(d => d.c))].filter(c => c);
            uniqueCats.forEach(c => { 
                const catName = cats_map[c] ? (cats_map[c][currentLang] || c) : c;
                tabsHtml += `<button class="tab-btn px-5 py-2.5 rounded-xl font-bold text-sm shrink-0 ${activeCategory===c?'active':''}" data-id="${c}">${catName}</button>`; 
            });

            container.innerHTML = tabsHtml;
            container.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    activeCategory = e.target.id === 'tab-all' ? 'all' : e.target.getAttribute('data-id');
                    renderTabs();
                    renderMenu();
                });
            });
        }

        function getBtnHtml(d, qty) {
            if (qty > 0) return `<div class="qty-picker w-full"><button onclick="window.changeQty('${d.id}', -1)"><i class="fa-solid fa-minus"></i></button><span class="text-lg">${qty}</span><button onclick="window.changeQty('${d.id}', 1)"><i class="fa-solid fa-plus"></i></button></div>`;
            return `<button onclick="window.changeQty('${d.id}', 1)" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white border border-white/10 font-bold py-3 rounded-xl transition shadow-md group-hover:bg-gradient-to-r group-hover:from-orange-500 group-hover:to-red-500 group-hover:border-transparent group-hover:shadow-orange-500/30"><i class="fa-solid fa-plus mr-1"></i> <span>${uiLocales[currentLang].add_to_cart}</span></button>`;
        }

        function renderMenu() {
            const q = searchInput.value.toLowerCase();
            const filtered = dishes.filter(d => (activeCategory === 'all' || d.c === activeCategory) && d.t[currentLang] && d.t[currentLang].toLowerCase().includes(q));
            let menuHtml = '';
            filtered.forEach(d => {
                const qty = cart[d.id] || 0;
                menuHtml += `<div class="glass-card menu-card p-5 flex flex-col justify-between group" data-dish-id="${d.id}"><div class="img-wrapper mb-5 shadow-inner"><img src="https://cdn.jsdelivr.net/gh/yumafergana/yuma-images@main/${d.i}" class="w-full h-48 object-cover" alt="" loading="lazy"></div><div><h3 class="text-xl font-bold text-zinc-100 mb-2 leading-tight">${escapeHTML(d.t[currentLang])}</h3><div class="text-orange-500 font-black text-2xl mb-5 drop-shadow-sm">${d.p.toLocaleString('ru-RU')} <span class="text-sm text-zinc-400 font-semibold">${uiLocales[currentLang].currency}</span></div></div><div class="action-btn-container">${getBtnHtml(d, qty)}</div></div>`;
            });
            menuContainer.innerHTML = menuHtml;
        }

        menuContainer.addEventListener('mousemove', (e) => {
            const card = e.target.closest('.menu-card');
            if (!card) return;
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
            card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
        });

        window.changeQty = (id, delta) => {
            const item = dishes.find(d => d.id === id);
            if(!item) return;
            if(!cart[id]) cart[id] = 0;
            cart[id] += delta;
            
            const newQty = cart[id];
            if(newQty <= 0) delete cart[id];
            
            localStorage.setItem('cart_yuma', JSON.stringify(cart));
            const cardElement = menuContainer.querySelector(`[data-dish-id="${id}"]`);
            if (cardElement) {
                const container = cardElement.querySelector('.action-btn-container');
                if (container) container.innerHTML = getBtnHtml(item, newQty);
            }
            updateCartFloatingButton();
            if(cartModal.style.display === 'flex') renderCartModal();
        };

        function updateCartFloatingButton() {
            let count = 0, total = 0;
            Object.keys(cart).forEach(id => {
                const item = dishes.find(d => d.id === id);
                if(item) { count += cart[id]; total += item.p * cart[id]; }
            });
            cartCount.innerText = count;
            cartTotal.innerText = total.toLocaleString('ru-RU');
            floatingCart.style.display = count > 0 ? 'flex' : 'none';
        }

        function renderCartModal() {
            let containerHtml = '';
            let total = 0;
            Object.keys(cart).forEach(id => {
                const item = dishes.find(d => d.id === id);
                if(item) {
                    const cost = item.p * cart[id];
                    total += cost;
                    containerHtml += `<div class="flex justify-between items-center bg-black/40 p-3.5 rounded-xl border border-white/5 shadow-inner"><div><h4 class="font-bold text-zinc-100 text-base mb-1">${escapeHTML(item.t[currentLang])}</h4><span class="text-sm text-orange-400 font-bold">${item.p.toLocaleString('ru-RU')} <span class="text-zinc-500 text-xs">x ${cart[id]}</span></span></div><div class="qty-picker scale-90 shadow-md"><button onclick="window.changeQty('${escapeHTML(id)}', -1)"><i class="fa-solid fa-minus"></i></button><button onclick="window.changeQty('${escapeHTML(id)}', 1)"><i class="fa-solid fa-plus"></i></button></div></div>`;
                }
            });
            cartItemsContainer.innerHTML = containerHtml;
            const isDelivery = document.getElementById('deliveryType').value === 'delivery';
            if(isDelivery && total > 0) total += 10000;
            cartFinalTotal.innerText = total.toLocaleString('ru-RU');
        }

        document.getElementById('deliveryType').addEventListener('change', (e) => {
            const addr = document.getElementById('clientAddress');
            if(e.target.value === 'delivery') { addr.classList.remove('hidden'); addr.setAttribute('required', 'true'); } 
            else { addr.classList.add('hidden'); addr.removeAttribute('required'); }
            renderCartModal();
        });

        floatingCart.addEventListener('click', () => {
            cartModal.style.display = 'flex';
            renderCartModal();
            if(localStorage.getItem('client_name')) document.getElementById('clientName').value = localStorage.getItem('client_name');
            if(localStorage.getItem('client_phone')) document.getElementById('clientPhone').value = localStorage.getItem('client_phone');
            if(localStorage.getItem('client_address')) document.getElementById('clientAddress').value = localStorage.getItem('client_address');
        });
        
        document.getElementById('closeCartBtn').addEventListener('click', () => { cartModal.style.display = 'none'; });
        document.getElementById('openOrdersBtn').addEventListener('click', () => { document.getElementById('ordersModal').style.display = 'flex'; listenToOrders(); });
        document.getElementById('closeOrdersBtn').addEventListener('click', () => { document.getElementById('ordersModal').style.display = 'none'; });

        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const lastOrderTime = localStorage.getItem('last_order_time');
            if(lastOrderTime && (Date.now() - lastOrderTime < 60000)) {
                showToast(uiLocales[currentLang].wait_5m, 'warning'); 
                return;
            }

            submitOrderBtn.disabled = true;
            submitOrderBtn.innerText = "...";

            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const delType = document.getElementById('deliveryType').value;
            const address = delType === 'delivery' ? document.getElementById('clientAddress').value : '';

            localStorage.setItem('client_name', name);
            localStorage.setItem('client_phone', phone);
            if(address) localStorage.setItem('client_address', address);

            let items = [];
            Object.keys(cart).forEach(id => {
                const dish = dishes.find(d => d.id === id);
                if(dish) items.push({ id: dish.id, qty: cart[id] });
            });
            const randomNumber = Math.floor(Math.random() * 1000000); 
            const formattedNumber = String(randomNumber).padStart(6, '0');

            const newOrder = {
                id: 'YM-' + formattedNumber,
                timestamp: Date.now(),
                dateStr: new Date().toLocaleString('ru-RU'),
                clientName: name, 
                clientPhone: phone,
                deliveryType: delType,
                address: address || 'Самовывоз',
                items: items,
                status: 'pending'
            };

            try {
                const ordersRef = ref(db, 'orders');
                const newOrderRef = push(ordersRef);
                const orderKey = newOrderRef.key;

                await set(newOrderRef, newOrder);
                
                let myOrders = JSON.parse(localStorage.getItem('my_orders_keys') || "[]");
                myOrders.push(orderKey);
                localStorage.setItem('my_orders_keys', JSON.stringify(myOrders));

                localStorage.setItem('last_order_time', Date.now());
                cart = {};
                localStorage.setItem('cart_yuma', JSON.stringify(cart));
                updateCartFloatingButton();
                cartModal.style.display = 'none';
                
                showToast(uiLocales[currentLang].success, 'success');
                renderMenu();
            } catch(err) {
                showToast(uiLocales[currentLang].error, 'error');
            } finally {
                submitOrderBtn.disabled = false;
                submitOrderBtn.innerText = uiLocales[currentLang].checkout_btn;
            }
        });

        let userOrdersData = {};
        function listenToOrders() {
            const container = document.getElementById('ordersContainer');
            const myKeys = JSON.parse(localStorage.getItem('my_orders_keys') || "[]");

            if(myKeys.length === 0) { 
                container.innerHTML = `<div class="text-zinc-500 font-medium text-center py-10 bg-black/30 rounded-xl border border-white/5">${uiLocales[currentLang].empty_orders}</div>`; 
                return; 
            }

            myKeys.forEach(key => {
                onValue(ref(db, 'orders/' + key), (snapshot) => {
                    if(snapshot.exists()) {
                        userOrdersData[key] = snapshot.val();
                        renderMyOrders();
                    }
                });
            });
        }

        function renderMyOrders() {
            const container = document.getElementById('ordersContainer');
            let containerHtml = '';
            
            const sortedKeys = Object.keys(userOrdersData).sort((a,b) => userOrdersData[b].timestamp - userOrdersData[a].timestamp);
            
            sortedKeys.forEach(key => {
                const order = userOrdersData[key];
                const statusText = escapeHTML(uiLocales[currentLang]['status_' + order.status] || order.status);
                
                let calculatedTotal = order.deliveryType === 'delivery' ? 10000 : 0;
                const itemsHtml = order.items.map(i => {
                    const dish = dishes.find(d => d.id === i.id);
                    if(dish) calculatedTotal += dish.p * i.qty;
                    return `${dish ? escapeHTML(dish.t[currentLang]) : 'Taom'} (<span class="text-orange-400">x${escapeHTML(i.qty)}</span>)`;
                }).join(', ');

                containerHtml += `
                    <div class="bg-black/40 border border-white/10 rounded-xl p-5 space-y-3 shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1.5 h-full ${order.status === 'pending' ? 'bg-orange-500' : (order.status === 'completed' ? 'bg-zinc-500' : 'bg-sky-500')}"></div>
                        <div class="flex justify-between items-start pl-2">
                            <div>
                                <span class="font-black text-white text-lg">${escapeHTML(order.id)}</span>
                                <div class="text-xs text-zinc-500 mt-1 font-semibold"><i class="fa-regular fa-calendar mr-1"></i> ${escapeHTML(order.dateStr)}</div>
                            </div>
                            <span class="badge status-${escapeHTML(order.status)} shadow-md">${statusText}</span>
                        </div>
                        <div class="text-sm text-zinc-300 font-medium pl-2 bg-white/5 p-2 rounded-lg leading-relaxed">${itemsHtml}</div>
                        <div class="text-right text-lg font-black text-orange-400 pt-2 border-t border-white/5">${calculatedTotal.toLocaleString('ru-RU')} ${uiLocales[currentLang].currency}</div>
                    </div>`;
            });
            container.innerHTML = containerHtml;
        }

        searchInput.addEventListener('input', () => renderMenu());
        
       
        loadDishesFromFirebase();
    </script>
</body>
</html>
